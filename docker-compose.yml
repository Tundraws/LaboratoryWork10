services:
  go-service:
    build:
      context: ./go-service
    container_name: go-service
    environment:
      JWT_SECRET: super-secret-key
      GO_SERVICE_PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lab-network

  python-service:
    build:
      context: ./python-service
    container_name: python-service
    environment:
      PYTHON_SERVICE_GO_SERVICE_URL: http://go-service:8080
      PYTHON_SERVICE_JWT_SECRET: super-secret-key
      PYTHON_SERVICE_REQUEST_TIMEOUT: "5"
    ports:
      - "8000:8000"
    depends_on:
      go-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge
